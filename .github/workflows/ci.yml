name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ui_suite:
        description: Browser test suite to run
        required: true
        default: full
        type: choice
        options:
          - desktop
          - full

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      sdk: ${{ steps.filter.outputs.sdk }}
      connect: ${{ steps.filter.outputs.connect }}
      mcp: ${{ steps.filter.outputs.mcp }}
      mcp_server: ${{ steps.filter.outputs.mcp_server }}
      signer: ${{ steps.filter.outputs.signer }}
      cli: ${{ steps.filter.outputs.cli }}
      full: ${{ steps.filter.outputs.full }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "code=true"
              echo "frontend=true"
              echo "backend=true"
              echo "sdk=true"
              echo "connect=true"
              echo "mcp=true"
              echo "mcp_server=true"
              echo "signer=true"
              echo "cli=true"
              echo "full=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${BASE_SHA:-}" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
          else
            git ls-tree -r --name-only "$HEAD_SHA" > changed-files.txt
          fi

          code=false
          frontend=false
          backend=false
          sdk=false
          connect=false
          mcp=false
          mcp_server=false
          signer=false
          cli=false
          full=false

          while IFS= read -r file; do
            case "$file" in
              *.md|docs/*|AGENTS.md|LICENSE|LICENSE.*)
                continue
                ;;
            esac

            case "$file" in
              .github/workflows/*.yml|.github/workflows/*.yaml|package.json|package-lock.json|tsconfig*.json)
                code=true
                full=true
                ;;
              packages/frontend/*)
                code=true
                frontend=true
                ;;
              packages/backend/*)
                code=true
                backend=true
                ;;
              packages/sdk/*)
                code=true
                sdk=true
                ;;
              packages/connect/*)
                code=true
                connect=true
                ;;
              packages/mcp/*)
                code=true
                mcp=true
                ;;
              packages/mcp-server/*)
                code=true
                mcp_server=true
                ;;
              packages/signer/*)
                code=true
                signer=true
                ;;
              packages/cli/*)
                code=true
                cli=true
                ;;
              packages/*)
                code=true
                full=true
                ;;
            esac
          done < changed-files.txt

          if [ "$full" = "true" ]; then
            frontend=true
            backend=true
            sdk=true
            connect=true
            mcp=true
            mcp_server=true
            signer=true
            cli=true
          fi

          if [ "$sdk" = "true" ]; then
            backend=true
            connect=true
            mcp=true
            mcp_server=true
            signer=true
          fi

          if [ "$mcp" = "true" ] || [ "$signer" = "true" ]; then
            connect=true
          fi

          {
            echo "code=$code"
            echo "frontend=$frontend"
            echo "backend=$backend"
            echo "sdk=$sdk"
            echo "connect=$connect"
            echo "mcp=$mcp"
            echo "mcp_server=$mcp_server"
            echo "signer=$signer"
            echo "cli=$cli"
            echo "full=$full"
          } >> "$GITHUB_OUTPUT"

  sdk_checks:
    name: SDK checks
    needs: changes
    if: needs.changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check SDK
        run: npm run typecheck -w packages/sdk

      - name: Run SDK unit tests
        run: npm run test -w packages/sdk

      - name: Build SDK
        run: npm run build -w packages/sdk

  cli_checks:
    name: CLI checks
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check CLI
        run: npm run typecheck -w packages/cli

      - name: Run CLI unit tests
        run: npm run test -w packages/cli

      - name: Build CLI
        run: npm run build -w packages/cli

  backend_checks:
    name: Backend checks
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: haven
          POSTGRES_PASSWORD: haven
          POSTGRES_DB: haven
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U haven"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://haven:haven@localhost:5432/haven
      JWT_SECRET: ci-test-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check backend
        run: npm run typecheck -w packages/backend

      - name: OpenAPI drift check
        # Surfaces the openapi spec drift assertions as a named step so a
        # failure is immediately visible in the workflow summary. The same
        # assertions also run as part of the full backend test suite below;
        # this step exists to make drift failures unambiguous on the GitHub
        # PR check list without scanning a 100+ line test output.
        run: npm run test -w packages/backend -- src/openapi/spec.test.ts

      - name: Run backend unit tests
        run: npm run test -w packages/backend

      - name: Build backend
        run: npm run build -w packages/backend

  mcp_checks:
    name: MCP checks
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check MCP
        run: npm run typecheck -w packages/mcp

      - name: Run MCP unit tests
        run: npm run test -w packages/mcp

      - name: Build MCP
        run: npm run build -w packages/mcp

  connect_checks:
    name: Connect checks
    needs: changes
    if: needs.changes.outputs.connect == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check connector
        run: npm run typecheck -w packages/connect

      - name: Run connector unit tests
        run: npm run test -w packages/connect

      - name: Build connector
        run: npm run build -w packages/connect

  install_smoke:
    name: Install-path smoke
    needs: changes
    # Run whenever connect, mcp, or sdk changes — these are the packages that
    # get packed and installed. Any of them can introduce the class of bugs
    # the smoke catches (stale MCP_VERSION, nested SDK resolution, broken
    # wire-format signing).
    if: >-
      needs.changes.outputs.connect == 'true' ||
      needs.changes.outputs.mcp == 'true' ||
      needs.changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SDK (required by MCP build step inside smoke:pack)
        run: npm run build -w packages/sdk

      - name: Build MCP (packs the up-to-date dist into the tarball)
        run: npm run build -w packages/mcp

      - name: Run install-path smoke tests
        # HAVEN_CONNECT_PACKAGE_SMOKE=1 enables the describeSmoke block.
        # smoke:pack also rebuilds sdk + mcp + signer before running so the
        # tarballs contain fresh dist output — belt and suspenders.
        run: npm run smoke:pack -w packages/connect

  mcp_server_checks:
    name: MCP server checks
    needs: changes
    if: needs.changes.outputs.mcp_server == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check MCP server
        run: npm run typecheck -w packages/mcp-server

      - name: Run MCP server unit tests
        run: npm run test -w packages/mcp-server

      - name: Build MCP server
        run: npm run build -w packages/mcp-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (MCP server) — catches a broken Dockerfile before deploy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/mcp-server/Dockerfile
          push: false
          load: false
          tags: haven-mcp-server:ci

  signer_checks:
    name: Signer checks
    needs: changes
    if: needs.changes.outputs.signer == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check signer
        run: npm run typecheck -w packages/signer

      - name: Run signer unit tests
        run: npm run test -w packages/signer

      - name: Build signer
        run: npm run build -w packages/signer

  frontend_checks:
    name: Frontend checks
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run typecheck -w packages/frontend

      - name: Run frontend unit tests
        run: npm run test -w packages/frontend

      - name: Build frontend
        run: npm run build -w packages/frontend
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-next-build
          path: |
            packages/frontend/.next/standalone
            packages/frontend/.next/static
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  browser_smoke:
    name: Frontend browser smoke
    needs: [changes, frontend_checks]
    if: always() && needs.changes.outputs.frontend == 'true' && needs.frontend_checks.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-next-build
          path: packages/frontend/.next

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/frontend

      - name: Run frontend browser smoke tests
        if: github.event_name != 'workflow_dispatch' || inputs.ui_suite != 'full'
        run: npm run test:e2e:desktop -w packages/frontend
        env:
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run full frontend browser tests
        if: github.event_name == 'workflow_dispatch' && inputs.ui_suite == 'full'
        run: npm run test:e2e:full -w packages/frontend
        env:
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            output/playwright/test-results
            output/playwright/html-report
          if-no-files-found: ignore

  ci:
    name: Lint, Type-check & Build
    needs: [changes, sdk_checks, cli_checks, backend_checks, mcp_checks, connect_checks, install_smoke, mcp_server_checks, signer_checks, frontend_checks]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Summarize required CI status
        run: |
          set -euo pipefail

          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Change detection result: ${{ needs.changes.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "No code-impacting files changed; required CI passed without running heavy checks."
            exit 0
          fi

          if [ "${{ needs.changes.outputs.sdk }}" = "true" ] && [ "${{ needs.sdk_checks.result }}" != "success" ]; then
            echo "SDK checks result: ${{ needs.sdk_checks.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.backend }}" = "true" ] && [ "${{ needs.backend_checks.result }}" != "success" ]; then
            echo "Backend checks result: ${{ needs.backend_checks.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.mcp }}" = "true" ] && [ "${{ needs.mcp_checks.result }}" != "success" ]; then
            echo "MCP checks result: ${{ needs.mcp_checks.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.connect }}" = "true" ] && [ "${{ needs.connect_checks.result }}" != "success" ]; then
            echo "Connect checks result: ${{ needs.connect_checks.result }}"
            exit 1
          fi

          connect_or_mcp_or_sdk_changed=false
          if [ "${{ needs.changes.outputs.connect }}" = "true" ] || [ "${{ needs.changes.outputs.mcp }}" = "true" ] || [ "${{ needs.changes.outputs.sdk }}" = "true" ]; then
            connect_or_mcp_or_sdk_changed=true
          fi
          if [ "$connect_or_mcp_or_sdk_changed" = "true" ] && [ "${{ needs.install_smoke.result }}" != "success" ]; then
            echo "Install-path smoke result: ${{ needs.install_smoke.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.mcp_server }}" = "true" ] && [ "${{ needs.mcp_server_checks.result }}" != "success" ]; then
            echo "MCP server checks result: ${{ needs.mcp_server_checks.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.signer }}" = "true" ] && [ "${{ needs.signer_checks.result }}" != "success" ]; then
            echo "Signer checks result: ${{ needs.signer_checks.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.cli }}" = "true" ] && [ "${{ needs.cli_checks.result }}" != "success" ]; then
            echo "CLI checks result: ${{ needs.cli_checks.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.frontend }}" = "true" ] && [ "${{ needs.frontend_checks.result }}" != "success" ]; then
            echo "Frontend checks result: ${{ needs.frontend_checks.result }}"
            exit 1
          fi

          echo "Required package checks passed. Browser smoke, when applicable, runs as a separate check."
