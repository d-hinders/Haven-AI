name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ui_suite:
        description: Browser test suite to run
        required: true
        default: full
        type: choice
        options:
          - desktop
          - full

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            {
              echo "code=true"
              echo "frontend=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${BASE_SHA:-}" ] && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
          else
            git ls-tree -r --name-only "$HEAD_SHA" > changed-files.txt
          fi

          code=false
          frontend=false

          while IFS= read -r file; do
            case "$file" in
              *.md|docs/*|AGENTS.md|LICENSE|LICENSE.*)
                continue
                ;;
            esac

            case "$file" in
              .github/workflows/*.yml|.github/workflows/*.yaml|package.json|package-lock.json|packages/*|tsconfig*.json)
                code=true
                ;;
            esac

            case "$file" in
              .github/workflows/*.yml|.github/workflows/*.yaml|package.json|package-lock.json|packages/frontend/*)
                frontend=true
                ;;
            esac
          done < changed-files.txt

          {
            echo "code=$code"
            echo "frontend=$frontend"
          } >> "$GITHUB_OUTPUT"

  code_checks:
    name: Code checks
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: haven
          POSTGRES_PASSWORD: haven
          POSTGRES_DB: haven
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U haven"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://haven:haven@localhost:5432/haven
      JWT_SECRET: ci-test-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check workspaces
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Build workspaces
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder

      - name: Upload frontend build
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-next-build
          path: |
            packages/frontend/.next/standalone
            packages/frontend/.next/static
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  browser_smoke:
    name: Frontend browser smoke
    needs: [changes, code_checks]
    if: always() && needs.changes.outputs.frontend == 'true' && needs.code_checks.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-next-build
          path: packages/frontend/.next

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/frontend

      - name: Run frontend browser smoke tests
        if: github.event_name != 'workflow_dispatch' || inputs.ui_suite != 'full'
        run: npm run test:e2e:desktop -w packages/frontend
        env:
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run full frontend browser tests
        if: github.event_name == 'workflow_dispatch' && inputs.ui_suite == 'full'
        run: npm run test:e2e:full -w packages/frontend
        env:
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ci-placeholder
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            output/playwright/test-results
            output/playwright/html-report
          if-no-files-found: ignore

  ci:
    name: Lint, Type-check & Build
    needs: [changes, code_checks]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Summarize required CI status
        run: |
          set -euo pipefail

          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "Change detection result: ${{ needs.changes.result }}"
            exit 1
          fi

          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "No code-impacting files changed; required CI passed without running heavy checks."
            exit 0
          fi

          if [ "${{ needs.code_checks.result }}" != "success" ]; then
            echo "Code checks result: ${{ needs.code_checks.result }}"
            exit 1
          fi

          echo "Code checks passed. Browser smoke, when applicable, runs as a separate check."
