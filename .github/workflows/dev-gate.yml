# Only allow PRs to main from the dev branch.
# Acts as a gate since GitHub Free has no native branch-source restriction.
name: "Dev gate: only dev → main"

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: "Check source branch"
        run: |
          SOURCE="${{ github.event.pull_request.head.ref }}"
          echo "Source branch: $SOURCE"
          if [[ "$SOURCE" != "dev" ]]; then
            echo "::error::Only the 'dev' branch is allowed to merge into 'main'. PR is from '$SOURCE'."
            exit 1
          fi
          echo "✅ Allowed: dev → main"
