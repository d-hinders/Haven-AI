name: Sync labels

# Labels-as-code: keep the surface taxonomy in .github/labels.yml in sync with
# the repo's actual labels. Runs on merge to dev/main when the label file (or
# this workflow) changes, and on demand. `skip-delete` leaves unlisted labels
# (epic, code-quality, …) alone. See docs/contributing/ship-playbooks/README.md.

on:
  push:
    branches: [main, dev]
    paths:
      - '.github/labels.yml'
      - '.github/workflows/labels.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: sync-labels
  cancel-in-progress: true

jobs:
  sync:
    name: Sync labels from .github/labels.yml
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: true
          dry-run: false
