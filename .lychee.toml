# lychee link-checker config for the docs-quality system (advisory).
# Runs in .github/workflows/docs.yml; failures are surfaced but non-blocking
# in this phase. See docs/contributing/docs-quality-system.md.

# Treat these as success even if rate-limited or auth-gated.
accept = [200, 206, 429]

# Don't hammer external hosts.
max_concurrency = 8
timeout = 20
retry_wait_time = 2
max_retries = 2

# Localhost / placeholder / example hosts and known-flaky external targets.
exclude = [
  "^https?://localhost",
  "^https?://127\\.0\\.0\\.1",
  "^https?://0\\.0\\.0\\.0",
  "example\\.com",
  "your-app\\.up\\.railway\\.app",
]

# Mail / file links are out of scope for doc link health.
exclude_mail = true
