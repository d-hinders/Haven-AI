# Vale config for Haven product-copy terminology (advisory).
#
# The terminology rule encodes the user-facing wording from
# docs/product/copy-guidelines.md. It is intentionally scoped in CI to
# docs/product/** only — engineering docs (architecture, operations) legitimately
# use words like "Safe", "AllowanceModule", and "signer", so the rule must not
# flood them. See docs/contributing/docs-quality-system.md.

StylesPath = .github/vale/styles
MinAlertLevel = suggestion

# Scope the terminology rule to product copy only, so a local `vale .` matches
# CI (which passes `files: docs/product`) and never floods engineering docs.
[docs/product/*.md]
BasedOnStyles = Haven

# Everywhere else: no styles. Engineering docs legitimately use "Safe",
# "AllowanceModule", "signer", etc.
[*.md]
BasedOnStyles = ""
